<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Draft Zero — VFX</title>
<link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=ZCOOL+KuaiLe&family=Epilogue:ital,wght@1,900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    user-select: none;
    pointer-events: none;
  }

  .celebration-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0) rotate(-8deg);
    z-index: 100;
    text-align: center;
    animation: textExplode 0.6s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .celebration-text h1 {
    font-family: 'Epilogue', sans-serif;
    font-style: italic;
    font-weight: 900;
    font-size: 72px;
    color: #fff;
    text-shadow:
      0 0 40px rgba(129, 39, 207, 0.8),
      0 0 80px rgba(129, 39, 207, 0.5),
      0 0 120px rgba(129, 39, 207, 0.3),
      4px 4px 0px #1a1c1c;
    letter-spacing: -3px;
    line-height: 1;
  }

  .celebration-text p {
    font-family: 'Gochi Hand', 'ZCOOL KuaiLe', cursive;
    font-size: 36px;
    color: #ffe24c;
    text-shadow:
      0 0 20px rgba(255, 226, 76, 0.6),
      3px 3px 0px #1a1c1c;
    margin-top: 8px;
    animation: subtitleSlide 0.5s 0.4s ease-out both;
  }

  /* 脉冲光晕 */
  .pulse-ring {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(129,39,207,0.6) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    animation: pulseExpand 0.8s 0.05s ease-out forwards;
    z-index: 50;
  }

  .pulse-ring-2 {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,226,76,0.4) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    animation: pulseExpand 1s 0.2s ease-out forwards;
    z-index: 49;
  }

  @keyframes pulseExpand {
    0% { width: 10px; height: 10px; opacity: 1; }
    100% { width: 800px; height: 800px; opacity: 0; }
  }

  @keyframes textExplode {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-8deg); opacity: 0; }
    60% { transform: translate(-50%, -50%) scale(1.15) rotate(-2deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); opacity: 1; }
  }

  @keyframes subtitleSlide {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* 文字淡出 */
  .fade-out {
    animation: fadeOut 1s 4.5s ease-in forwards;
  }

  @keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
  <!-- 脉冲光晕 -->
  <div class="pulse-ring"></div>
  <div class="pulse-ring-2"></div>

  <!-- 中心文字 -->
  <div class="celebration-text fade-out">
    <h1>DRAFT ZERO</h1>
    <p>完成了！🔥</p>
  </div>

  <canvas id="confetti-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:10;pointer-events:none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    // 使用独立 canvas 以免和透明背景冲突
    const canvas = document.getElementById('confetti-canvas');
    const myConfetti = confetti.create(canvas, { resize: true, useWorker: true });

    const COLORS_PURPLE = ['#8127cf', '#9c48ea', '#ddb7ff', '#f0dbff', '#ffffff'];
    const COLORS_GOLD   = ['#ffe24c', '#e2c62d', '#c4ab01', '#ffffff', '#fff9c4'];
    const COLORS_PARTY  = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#6c5ce7', '#fd79a8', '#00b894', '#e17055'];
    const COLORS_ALL    = [...COLORS_PURPLE, ...COLORS_GOLD, ...COLORS_PARTY];

    // === 第一波 T=0: 中心大爆炸 ===
    myConfetti({
      particleCount: 200,
      spread: 360,
      origin: { x: 0.5, y: 0.5 },
      startVelocity: 55,
      gravity: 0.7,
      ticks: 400,
      colors: COLORS_ALL,
      shapes: ['circle', 'square'],
      scalar: 1.4,
      drift: 0,
    });

    // === 第二波 T=100ms: 四角炮台齐射 ===
    setTimeout(() => {
      // 左下
      myConfetti({
        particleCount: 100,
        angle: 45,
        spread: 60,
        origin: { x: 0, y: 1 },
        startVelocity: 60,
        gravity: 0.8,
        ticks: 350,
        colors: COLORS_GOLD,
        scalar: 1.6,
      });
      // 右下
      myConfetti({
        particleCount: 100,
        angle: 135,
        spread: 60,
        origin: { x: 1, y: 1 },
        startVelocity: 60,
        gravity: 0.8,
        ticks: 350,
        colors: COLORS_PURPLE,
        scalar: 1.6,
      });
      // 左上
      myConfetti({
        particleCount: 60,
        angle: 315,
        spread: 50,
        origin: { x: 0, y: 0 },
        startVelocity: 50,
        gravity: 0.9,
        ticks: 300,
        colors: COLORS_PARTY,
        scalar: 1.2,
      });
      // 右上
      myConfetti({
        particleCount: 60,
        angle: 225,
        spread: 50,
        origin: { x: 1, y: 0 },
        startVelocity: 50,
        gravity: 0.9,
        ticks: 300,
        colors: COLORS_PARTY,
        scalar: 1.2,
      });
    }, 100);

    // === 第三波 T=400ms: 顶部彩纸瀑布 ===
    setTimeout(() => {
      myConfetti({
        particleCount: 150,
        angle: 270,
        spread: 140,
        origin: { x: 0.5, y: -0.1 },
        startVelocity: 35,
        gravity: 1.2,
        ticks: 500,
        colors: COLORS_ALL,
        shapes: ['circle', 'square'],
        scalar: 1.3,
      });
    }, 400);

    // === 第四波 T=700ms: 中心二次爆炸（更大粒子） ===
    setTimeout(() => {
      myConfetti({
        particleCount: 100,
        spread: 360,
        origin: { x: 0.5, y: 0.45 },
        startVelocity: 40,
        gravity: 0.5,
        ticks: 500,
        colors: COLORS_GOLD,
        shapes: ['circle'],
        scalar: 2.0,
      });
    }, 700);

    // === 第五波 T=1000ms: 双侧喷射 ===
    setTimeout(() => {
      myConfetti({
        particleCount: 80,
        angle: 60,
        spread: 40,
        origin: { x: -0.05, y: 0.5 },
        startVelocity: 65,
        gravity: 0.6,
        ticks: 400,
        colors: COLORS_PURPLE,
        scalar: 1.5,
      });
      myConfetti({
        particleCount: 80,
        angle: 120,
        spread: 40,
        origin: { x: 1.05, y: 0.5 },
        startVelocity: 65,
        gravity: 0.6,
        ticks: 400,
        colors: COLORS_GOLD,
        scalar: 1.5,
      });
    }, 1000);

    // === 持续彩纸雨 2-5秒 ===
    const rainEnd = Date.now() + 5000;
    const rainInterval = setInterval(() => {
      if (Date.now() > rainEnd) {
        clearInterval(rainInterval);
        return;
      }
      // 左侧飘散
      myConfetti({
        particleCount: 3,
        angle: 60,
        spread: 55,
        origin: { x: 0, y: Math.random() * 0.6 },
        startVelocity: 30 + Math.random() * 20,
        colors: COLORS_ALL,
        scalar: 0.8 + Math.random() * 0.8,
        gravity: 0.8,
        ticks: 300,
      });
      // 右侧飘散
      myConfetti({
        particleCount: 3,
        angle: 120,
        spread: 55,
        origin: { x: 1, y: Math.random() * 0.6 },
        startVelocity: 30 + Math.random() * 20,
        colors: COLORS_ALL,
        scalar: 0.8 + Math.random() * 0.8,
        gravity: 0.8,
        ticks: 300,
      });
    }, 80);

    // === 第六波 T=2500ms: 最后的大爆发 ===
    setTimeout(() => {
      myConfetti({
        particleCount: 250,
        spread: 360,
        origin: { x: 0.5, y: 0.5 },
        startVelocity: 50,
        gravity: 0.6,
        ticks: 500,
        colors: COLORS_ALL,
        shapes: ['circle', 'square'],
        scalar: 1.8,
      });
    }, 2500);

    // === 6秒后通知主进程关闭 ===
    setTimeout(() => {
      try {
        window.draftzero?.vfxDone();
      } catch (e) {
        // VFX 窗口可能没有 preload
        const { ipcRenderer } = require('electron');
        ipcRenderer.invoke('vfx-done');
      }
    }, 6500);
  </script>
</body>
</html>
